# Updated: Includes your RDBMS 
highlighted_projects:
  - name: Jarvis RDBMS (Relational Database)
    description: Designed and deployed a containerized PostgreSQL database for a country club management system using Docker. Architected the database schema (DDL) and managed data ingestion for members, facilities, and bookings. Engineered complex SQL queries using Joins, Aggregations, and Window Functions.


  - name: Java Grep App
    description: Developed a Java application to search for text patterns within files recursively across directories. Leveraged Lambda expressions and the Streams API for efficient data processing, while implementing SLF4J for application logging. 

  - name: Data Engineering PoC (London Gift Shop)
    description: Engineered a Proof of Concept (PoC) for a retail data pipeline using Python and Pandas. Implemented data ingestion and transformation logic to process store transactions and inventory data, creating a scalable foundation for business intelligence and reporting.

  - name: Jarvis Remote Desktop (Infrastructure)
    description: Provisioned and configured a Google Cloud Platform (GCP) Virtual Machine with Rocky Linux to serve as a dedicated remote development environment. Orchestrated the installation of Docker and VNC servers, and configured firewall rules for secure access.      

  - name: Databricks Financial ETL Pipeline
    description: Developed a cloud-based data pipeline using the Medallion Architecture to ingest, transform, and analyze financial transaction data. Built data validation layers to ensure information reliability and created aggregate analytics dashboards for fraud pattern tracking.


# ---------------------------------------------------------
# HIGHLIGHTED PROJECTS
# ---------------------------------------------------------
highlighted_projects:
  - name: Jarvis RDBMS (Relational Database)
    description: |
      Designed and deployed a containerized PostgreSQL database for a country club management system using Docker. Architected the database schema (DDL) and managed data ingestion for members, facilities, and bookings. Engineered complex SQL queries using Joins, Aggregations, and Window Functions.

  - name: Java Grep App
    description: |
      Developed a Java application to search for text patterns within files recursively across directories. Leveraged Lambda expressions and the Streams API for efficient data processing, while implementing SLF4J for application logging. 

  - name: Data Engineering PoC (London Gift Shop)
    description: |
      Engineered a Proof of Concept (PoC) for a retail data pipeline using Python and Pandas. Implemented data ingestion and transformation logic to process store transactions and inventory data, creating a scalable foundation for business intelligence and reporting.

  - name: Databricks Financial ETL Pipeline
    description: |
      Developed a cloud-based data pipeline using the Medallion Architecture to ingest, transform, and analyze financial transaction data. Built data validation layers to ensure information reliability and created aggregate analytics dashboards for fraud pattern tracking.

  - name: Power BI Fundamentals
    description: |
      Developed three interactive Power BI dashboards to deliver actionable insights across sales, survey, and financial data. Built a Beverages Sales Dashboard analyzing Coca-Cola's sales and operating profit across U.S. states using AI-driven Q and A, key influencer visuals, and dynamic maps. Transformed and analyzed over 600 survey responses to create a Data Professionals Report highlighting trends in salary, job satisfaction, and in-demand skills. Designed a Stocks Dashboard by integrating Alpha Vantage API data to visualize historical prices, trading volume, key financial metrics, and earnings estimates. Performed data cleaning, transformation, and modeling, validated outputs, and translated complex data into clear, data-driven business insights.

  - name: PySpark
    description: |
      Designed and deployed four comprehensive ETL pipelines within the Databricks platform using PySpark to ingest and process data from diverse sources, including REST APIs, PostgreSQL databases (via JDBC), and internal Hive tables. Developed data manipulation logic such as three-way joins and time-series aggregations to derive business-critical metrics, while optimizing storage and query performance through the use of Parquet and Delta Lake formats. Engineered data partitioning strategies to enable efficient partition pruning, significantly reducing I/O overhead and execution time for downstream analytics. Managed real-world data engineering challenges, including handling API rate limits and ensuring schema consistency across heterogeneous data environments to deliver production-ready data assets.

  - name: BSA Fundamentals
    description: |
      Structured and executed a comprehensive BSA project centered on deconstructing complex product requests into clear, actionable business objectives. By performing detailed requirements analysis, business needs were successfully separated from technical constraints, allowing high-level goals to be translated into specific functional and non-functional specifications. The project involved simulating stakeholder engagement through a dedicated requirements elicitation process and interactive presentations to document critical assumptions and clarifications, ensuring the completeness of the system's scope. This process culminated in the production of professional BRD and SRD-style documentation, demonstrating a strong ability to communicate business logic, data requirements, and intended system behavior to both technical and non-technical audiences.

